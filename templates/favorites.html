<!doctype html>
<html>
  <head>
    <title>TastyBites - My Favorites</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      html,
      body {
        height: auto !important;
        overflow: auto !important;
        justify-content: flex-start !important;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        width: 90%;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>❤️ My Favorites</h1>
      {% if favorites %}
      <ul class="results">
        {% for f in favorites %}
        <li>
          <strong>{{ f.restaurant_name }}</strong> - {{ f.category }} - {{
          f.minority_owned }}-owned<br />
          📍 {{ f.address }}<br />
          Rating: {{ f.rating }}
          <form action="/favorite/toggle" method="post" style="display: inline">
            <input
              type="hidden"
              name="restaurant_json"
              value='{"name": "{{ f.restaurant_name }}"}'
            />
            <button
              type="submit"
              style="
                background: none;
                border: none;
                cursor: pointer;
                font-size: 1.2em;
              "
            >
              ❤️
            </button>
          </form>
        </li>
        {% endfor %}
      </ul>
      {% else %}
      <p>No favorites yet. Go find some restaurants!</p>
      {% endif %}
      <a href="/">← Back Home</a>
    </div>
  </body>
</html>
